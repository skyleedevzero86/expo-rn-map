    <title>현재 위치</title>
    <script>
      (function(){
        var w = console.warn;
        if (typeof w === 'function') {
          console.warn = function() {
            var s = arguments[0] != null ? String(arguments[0]) : '';
            if (s.indexOf('document.write') !== -1 && s.indexOf('parser-blocking') !== -1) return;
            return w.apply(console, arguments);
          };
        }
      })();
    </script>
